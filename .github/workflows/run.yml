name: RunFiles
on:
  schedule:
    - cron: 49 3 * * 1-5
  workflow_dispatch: null
env:
  U_ARR: ${{ secrets.U_ARR }}
  ZIP_URL: ${{ secrets.ZIP_URL }}
  ZIP_PASS: ${{ secrets.ZIP_PASS }}
  FORM_URL: ${{ secrets.FORM_URL }}
  FORM_KEY: ${{ secrets.FORM_KEY }}
  DEBUG_U_P: ${{ secrets.DEBUG_U_P }}
  U_IB: ${{ secrets.U_IB }}
  P_IB: ${{ secrets.P_IB }}
  MSG_URL: ${{ secrets.MSG_URL }}
  UP_K: ${{ secrets.UP_K }}
  ALERT_FORM_URL: ${{ secrets.ALERT_FORM_URL }}
  ALERT_FORM_KEY: ${{ secrets.ALERT_FORM_KEY }}
jobs:
  runfile:
    runs-on: ubuntu-latest
    steps:
      - uses: fawazahmed0/wireit@setup-github-actions-caching
      - uses: fawazahmed0/action-debug@forms
        with:
          credentials: ${{ secrets.DEBUG_U_P }}
          formurl: ${{ secrets.FORM_URL }}
          formkey: ${{ secrets.FORM_KEY }}
          name: ${{ github.job }}-${GITHUB_WORKFLOW}
      - uses: actions/checkout@v4
        with:
          ssh-key: ${{ secrets.SSH_REPO_DEPLOY_PRIVATE_KEY }}
          repository: ${{ secrets.REPO_NAME }}
      - uses: actions/setup-python@v4
        with:
          python-version: 3.11.6
          cache: pip
      - uses: actions/setup-node@v4
        with:
          node-version: 21.5.0
          cache: npm
      - name: Install dependencies
        shell: bash
        run: |
          sudo apt-get update -y
          sudo apt-get install -y tesseract-ocr libtesseract-dev
          docker run --name mycont --rm -itd -v "$(pwd):$(pwd)" -v "/Volumes:/Volumes" -w "$(pwd)" debian:experimental-20240311
          docker exec -i mycont apt-get update
          docker exec -i mycont apt-get install poppler-utils/experimental -y
          pip3 install -r requirements.txt >/dev/null
          npm ci >/dev/null
          npx playwright install --with-deps
      - name: Setup 2GB RAMDisk
        shell: bash
        run: |
          sudo mkdir -p /media/MY_RAM_DISK
          sudo mount -t tmpfs -o size=2G tmpfs /media/MY_RAM_DISK/
          sudo ln -s /media /Volumes
      - name: Symlink docker binaries
        shell: bash
        run: |
          node symlink-binaries.js
      - name: Extract zip
        shell: bash
        run: |
          wget $ZIP_URL
          7z x -y eejfgfqe -p$ZIP_PASS >/dev/null
          rm -rf eejfgfqe
      - name: Run Get
        continue-on-error: true
        shell: bash
        run: |
          npm run fetch-est > logfile.txt 2>&1 || npm run fetch-est >> logfile.txt 2>&1
      - name: Run Program
        shell: bash
        run: |
          uvicorn --app-dir=code server:app --port 9981 > pythonserverlog.txt 2>&1 &
          node code/server.js > nodeserverlog.txt 2>&1 &
          node code/main.js >> logfile.txt 2>&1
      - name: Retry Program run if previous failed
        if: failure()
        shell: bash
        run: |
          node code/main.js >> logfile.txt 2>&1
      - name: Alert Failure
        if: failure()
        shell: bash
        run: |
          curl -s -o /dev/null $ALERT_FORM_URL -d ifq -d "$ALERT_FORM_KEY=alert" -d submit=Submit
      - name: zip the logfile
        if: always()
        shell: bash
        run: |
          sed -i "s/^::add-mask::.*$//" logfile.txt
          echo >> logfile.txt && 7z a logfile.7z logfile.txt >/dev/null
          rm -f logfile.txt
      - name: commit and push
        if: always()
        shell: bash
        run: |
          git config --global user.email github-actions@github.com
          git config --global user.name github-actions
          git pull >/dev/null
          git add -A >/dev/null
          git commit -m 'Generated Files' >/dev/null
          git push >/dev/null
  serve0:
    runs-on: ubuntu-latest
    steps:
      - name: Set Start Time
        shell: bash
        run: |
          echo "actionstarttime=`date +%s`" >> $GITHUB_ENV
      - uses: fawazahmed0/wireit@setup-github-actions-caching
      - uses: fawazahmed0/action-debug@forms
        with:
          credentials: ${{ secrets.DEBUG_U_P }}
          formurl: ${{ secrets.FORM_URL }}
          formkey: ${{ secrets.FORM_KEY }}
          name: ${{ github.job }}-${GITHUB_WORKFLOW}
      - uses: actions/checkout@v4
        with:
          ssh-key: ${{ secrets.SSH_REPO_DEPLOY_PRIVATE_KEY }}
          repository: ${{ secrets.REPO_NAME }}
      - uses: actions/setup-python@v4
        with:
          python-version: 3.11.6
          cache: pip
      - uses: actions/setup-node@v4
        with:
          node-version: 21.5.0
          cache: npm
      - name: Install dependencies
        shell: bash
        run: |
          sudo apt-get update -y
          sudo apt-get install -y tesseract-ocr libtesseract-dev
          docker run --name mycont --rm -itd -v "$(pwd):$(pwd)" -v "/Volumes:/Volumes" -w "$(pwd)" debian:experimental-20240311
          docker exec -i mycont apt-get update
          docker exec -i mycont apt-get install poppler-utils/experimental -y
          pip3 install -r requirements.txt >/dev/null
          npm ci >/dev/null
          npx playwright install --with-deps
      - name: Setup 512MB RAMDisk
        shell: bash
        run: |
          sudo mkdir -p /media/MY_RAM_DISK
          sudo mount -t tmpfs -o size=512M tmpfs /media/MY_RAM_DISK/
          sudo ln -s /media /Volumes
      - name: Symlink docker binaries
        shell: bash
        run: |
          node symlink-binaries.js
      - name: Extract zip
        shell: bash
        run: |
          wget $ZIP_URL
          7z x -y eejfgfqe -p$ZIP_PASS >/dev/null
          rm -rf eejfgfqe
      - name: Run Program
        shell: bash
        run: |
          uvicorn --app-dir=code server:app --port 9981 > pythonserverlog.txt 2>&1 &
          node code/server.js > nodeserverlog.txt 2>&1 &
      - name: Save URL
        shell: bash
        run: |
          sleep 60
          cloudflared tunnel --url http://localhost:3000 > nodeserver.txt 2>&1 &
          cloudflared tunnel --url http://localhost:9981 > pythonserver.txt 2>&1 &
          sleep 60
      - name: zip tunnel log
        shell: bash
        run: |
          echo >> nodeserver.txt && echo >> pythonserver.txt && 7z a tunnellog.7z nodeserver.txt pythonserver.txt -mhe=on -p$ZIP_PASS >/dev/null
      - name: Upload tunnel log
        uses: actions/upload-artifact@v3
        with:
          name: ${{ github.job }}-tunnel-log
          path: tunnellog.7z
          retention-days: 1
      - name: upload logs
        shell: bash
        run: |
          curl -s -o /dev/null $FORM_URL -d ifq -d "$FORM_KEY=`cat nodeserver.txt && cat nodeserverlog.txt && cat pythonserver.txt && cat pythonserverlog.txt`" -d submit=Submit
      - name: Sleep
        shell: bash
        run: |
          sleep $((21500 - `date +%s` + ${{ env.actionstarttime }}))
      - name: zip the logfile
        if: always()
        shell: bash
        run: |
          echo >> nodeserverlog.txt && echo >> pythonserverlog.txt && 7z a serverlog.7z nodeserverlog.txt pythonserverlog.txt -mhe=on -p$ZIP_PASS >/dev/null
      - name: Upload log
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: ${{ github.job }}-log
          path: serverlog.7z
          retention-days: 1
